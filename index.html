<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;700&family=Nunito:wght@300;400;600&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131f;
    --surface2: #1c1c2e;
    --accent: #7c5cfc;
    --accent2: #fc5c7d;
    --accent3: #5cf8fc;
    --text: #e8e8f5;
    --muted: #6b6b8a;
    --border: rgba(124,92,252,0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(124,92,252,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(252,92,125,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(92,248,252,0.04) 0%, transparent 60%);
    animation: bgShift 12s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes bgShift {
    0% { transform: translate(0,0) rotate(0deg); }
    100% { transform: translate(2%, 2%) rotate(3deg); }
  }

  .header {
    position: relative;
    z-index: 10;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    background: rgba(19,19,31,0.8);
    backdrop-filter: blur(20px);
  }

  .logo {
    font-family: 'Unbounded', sans-serif;
    font-size: 14px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }

  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.3); opacity: 0.7; }
  }

  .modes {
    display: flex;
    gap: 6px;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(13,13,20,0.6);
    backdrop-filter: blur(10px);
    position: relative;
    z-index: 10;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .modes::-webkit-scrollbar { display: none; }

  .mode-btn {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid transparent;
    background: var(--surface);
    color: var(--muted);
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .mode-btn:hover { color: var(--text); border-color: var(--border); }

  .mode-btn.active {
    background: linear-gradient(135deg, var(--accent), rgba(124,92,252,0.5));
    border-color: var(--accent);
    color: white;
  }

  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
    z-index: 5;
    scrollbar-width: thin;
    scrollbar-color: var(--surface2) transparent;
  }

  .welcome {
    text-align: center;
    padding: 40px 20px;
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .welcome-icon {
    font-size: 48px;
    margin-bottom: 16px;
    display: block;
  }

  .welcome h2 {
    font-family: 'Unbounded', sans-serif;
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--text), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .welcome p {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
    max-width: 400px;
    margin: 0 auto 24px;
  }

  .quick-prompts {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }

  .quick-btn {
    padding: 8px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Nunito', sans-serif;
  }

  .quick-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-2px);
  }

  .message {
    display: flex;
    gap: 12px;
    animation: fadeUp 0.3s ease both;
    max-width: 800px;
  }

  .message.user { align-self: flex-end; flex-direction: row-reverse; }
  .message.assistant { align-self: flex-start; }

  .avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 4px;
  }

  .message.user .avatar {
    background: linear-gradient(135deg, var(--accent2), #ff8c42);
  }

  .message.assistant .avatar {
    background: linear-gradient(135deg, var(--accent), var(--accent3));
  }

  .bubble {
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.7;
    max-width: 560px;
  }

  .message.user .bubble {
    background: linear-gradient(135deg, var(--accent), rgba(124,92,252,0.7));
    border-bottom-right-radius: 4px;
  }

  .message.assistant .bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .bubble strong { color: var(--accent3); }
  .bubble code {
    background: rgba(0,0,0,0.3);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: monospace;
    font-size: 12px;
    color: var(--accent3);
  }

  .typing {
    display: flex;
    gap: 5px;
    padding: 14px 18px;
  }

  .typing span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.2s ease-in-out infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; background: var(--accent2); }
  .typing span:nth-child(3) { animation-delay: 0.4s; background: var(--accent3); }

  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30% { transform: translateY(-8px); }
  }

  .input-area {
    position: relative;
    z-index: 10;
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: rgba(13,13,20,0.8);
    backdrop-filter: blur(20px);
  }

  .input-wrapper {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 10px 14px;
    transition: border-color 0.2s;
  }

  .input-wrapper:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,92,252,0.1);
  }

  textarea {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    resize: none;
    min-height: 22px;
    max-height: 120px;
    line-height: 1.5;
  }

  textarea::placeholder { color: var(--muted); }

  .send-btn {
    width: 36px; height: 36px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .send-btn:hover { transform: scale(1.05); opacity: 0.9; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .hint {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: 8px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo-dot"></div>
  <div class="logo">STUDY·AI</div>
</div>

<div class="modes">
  <button class="mode-btn active" data-mode="general" onclick="setMode(this)">🧠 Помощник</button>
  <button class="mode-btn" data-mode="explain" onclick="setMode(this)">💡 Объяснить тему</button>
  <button class="mode-btn" data-mode="check" onclick="setMode(this)">✍️ Проверить текст</button>
  <button class="mode-btn" data-mode="solve" onclick="setMode(this)">🔢 Решить задачу</button>
  <button class="mode-btn" data-mode="quiz" onclick="setMode(this)">🎯 Квиз для проверки</button>
</div>

<div class="chat-container" id="chat">
  <div class="welcome" id="welcome">
    <span class="welcome-icon">🤖</span>
    <h2>Привет! Я твой AI-помощник</h2>
    <p>Помогу объяснить сложные темы, проверить текст, решить задачи и подготовиться к экзаменам. Выбери режим или просто напиши вопрос.</p>
    <div class="quick-prompts">
      <button class="quick-btn" onclick="sendQuick('Объясни что такое нейронные сети простым языком')">🧠 Нейронные сети</button>
      <button class="quick-btn" onclick="sendQuick('Как работает монгольская тактика боя?')">⚔️ История монголов</button>
      <button class="quick-btn" onclick="sendQuick('Проверь мой текст: Я пошёл в магазин и купил хлеб молоко и яйца')">✍️ Проверить текст</button>
      <button class="quick-btn" onclick="sendQuick('Реши: 2x + 5 = 13, найди x')">🔢 Алгебра</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrapper">
    <textarea id="input" placeholder="Задай вопрос или введи текст для проверки..." rows="1" 
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
  <div class="hint">Enter — отправить · Shift+Enter — новая строка</div>
</div>

<script>
  let currentMode = 'general';
  let isLoading = false;
  let conversationHistory = [];

  const systemPrompts = {
    general: `Ты умный AI-помощник для учёбы и работы. Отвечай на русском языке. 
Будь дружелюбным, чётким и полезным. Используй примеры, структурируй ответы.
Когда нужно — используй эмодзи для наглядности, но не перегружай ими текст.`,

    explain: `Ты опытный преподаватель. Объясняй темы максимально просто и понятно, 
используя аналогии и примеры из реальной жизни. Структурируй объяснение:
1) Суть за одно предложение 2) Подробное объяснение 3) Пример или аналогия. 
Отвечай на русском языке.`,

    check: `Ты опытный редактор и корректор. Проверяй тексты на:
- Грамматические и пунктуационные ошибки
- Стиль и читаемость  
- Логику и структуру
Сначала приведи исправленный вариант, затем объясни все изменения.
Отвечай на русском языке.`,

    solve: `Ты репетитор по математике и логике. Решай задачи пошагово:
1) Определи тип задачи
2) Реши по шагам с объяснением каждого
3) Проверь ответ
4) Дай совет как запомнить метод решения.
Отвечай на русском языке.`,

    quiz: `Ты создаёшь образовательные квизы. Когда пользователь называет тему:
1) Задай 3-5 вопросов по теме (нумерованных)
2) Жди ответов пользователя
3) Проверь ответы и объясни правильные решения
4) Дай оценку знаний.
Отвечай на русском языке.`
  };

  function setMode(btn) {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function sendQuick(text) {
    document.getElementById('input').value = text;
    sendMessage();
  }

  function addMessage(role, content) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    
    const avatar = role === 'user' ? '👤' : '🤖';
    div.innerHTML = `
      <div class="avatar">${avatar}</div>
      <div class="bubble">${formatText(content)}</div>
    `;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function formatText(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\n/g, '<br>');
  }

  function showTyping() {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();
    
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'message assistant';
    div.id = 'typing';
    div.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="bubble">
        <div class="typing">
          <span></span><span></span><span></span>
        </div>
      </div>
    `;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;

    addMessage('user', text);
    conversationHistory.push({ role: 'user', content: text });
    showTyping();

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: systemPrompts[currentMode],
          messages: conversationHistory
        })
      });

      const data = await response.json();
      removeTyping();

      const reply = data.content?.[0]?.text || 'Что-то пошло не так. Попробуй ещё раз.';
      addMessage('assistant', reply);
      conversationHistory.push({ role: 'assistant', content: reply });

    } catch (err) {
      removeTyping();
      addMessage('assistant', '❌ Ошибка соединения. Проверь интернет и попробуй снова.');
    }

    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('input').focus();
  }
</script>
</body>
</html>
